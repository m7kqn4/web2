<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Задание 2</title>
    <meta charset="UTF-8">
    <style>
        :root {
            --accent: #1c3559;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
        }
        body { font-family: 'Inter', sans-serif; background: #bad9ee; color: var(--text); margin: 0; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-weight: 700; font-size: 2.2rem; margin-bottom: 10px; color: #1c3559; }

        .accordion-item { background: var(--card); border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e5e7eb; transition: 0.3s; }
        .accordion-item:hover { border-color: var(--accent); transform: translateY(-2px); }

        .accordion-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
        .task-title { display: flex; align-items: center; gap: 15px; font-weight: 500; font-size: 1.1rem; }
        .task-num { background: #eef2ff; color: var(--accent); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 700; font-size: 0.9rem; }
        
        .arrow { width: 20px; height: 20px; transition: 0.4s; fill: none; stroke: #9ca3af; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .active .arrow { transform: rotate(180deg); stroke: var(--accent); }

        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1); background: #000000; }
        .active .accordion-content { max-height: 1200px; border-top: 1px solid #f3f4f6; }
        
        .inner-padding { padding: 25px; }
        .desc b { color: #111827; }

        .img-box { background: #000; border-radius: 8px; padding: 8px; }
        img { width: 100%; border-radius: 4px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Задание 2</h1>
    </header>

    <div class="accordion-item">
        <div class="accordion-header">
            <div class="task-title"><span class="task-num">1</span> Главная страница (HTTP 1.0)</div>
            <svg class="arrow" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
        </div>
        <div class="accordion-content">
            <div class="inner-padding">
                <div class="img-box"><img src="Рисунок1.png"></div>
            </div>
        </div>
    </div>

    <div class="accordion-item">
        <div class="accordion-header">
            <div class="task-title"><span class="task-num">2</span> Внутренняя страница (HTTP 1.1)</div>
            <svg class="arrow" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
        </div>
        <div class="accordion-content">
            <div class="inner-padding">
                <div class="img-box"><img src="Рисунок2.png"></div>
            </div>
        </div>
    </div>

    <div class="accordion-item">
        <div class="accordion-header">
            <div class="task-title"><span class="task-num">3</span> Размер файла</div>
            <svg class="arrow" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
        </div>
        <div class="accordion-content">
            <div class="inner-padding">
                <div class="img-box"><img src="Рисунок3.png"></div>
            </div>
        </div>
    </div>

    <div class="accordion-item">
        <div class="accordion-header">
            <div class="task-title"><span class="task-num">4</span> Медиатип ресурса</div>
            <svg class="arrow" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
        </div>
        <div class="accordion-content">
            <div class="inner-padding">
                <div class="img-box"><img src="Рисунок4.png"></div>
            </div>
        </div>
    </div>

    <div class="accordion-item">
        <div class="accordion-header">
            <div class="task-title"><span class="task-num">5</span> Отправка комментария</div>
            <svg class="arrow" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
        </div>
        <div class="accordion-content">
            <div class="inner-padding">
                <div class="img-box"><img src="Рисунок5.png"></div>
            </div>
        </div>
    </div>

    <div class="accordion-item">
        <div class="accordion-header">
            <div class="task-title"><span class="task-num">6</span>Первые 100 байт</div>
            <svg class="arrow" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
        </div>
        <div class="accordion-content">
            <div class="inner-padding">
                <div class="img-box"><img src="Рисунок6.png"></div>
            </div>
        </div>
    </div>

    <div class="accordion-item">
        <div class="accordion-header">
            <div class="task-title"><span class="task-num">7</span> Кодировка ресурса</div>
            <svg class="arrow" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
        </div>
        <div class="accordion-content">
            <div class="inner-padding">
                <div class="img-box"><img src="Рисунок7.png"></div>
            </div>
        </div>
    </div>

</div>

<script>
    document.querySelectorAll('.accordion-header').forEach(button => {
        button.addEventListener('click', () => {
            const item = button.parentElement;
            item.classList.toggle('active');
        });
    });
</script>

</body>
</html>
