<!DOCTYPE html>
<html lang="ru">

<head>
    <title>Задание 1</title>
    <meta charset="UTF-8">

    <style>
    body {
        background-color: #0c0c0c;
        padding: 40px 10px;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: #e0e0e0;
        margin: 0;
    }

    h1 {
        text-align: center;
        font-size: 32px;
        margin-bottom: 50px;
        color: #ffffff;
    }

    .collage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 60px;
        max-width: 1000px;
        margin: 0 auto;
    }

    .image-container {
        width: 100%;
        background-color: #1a1a1a;
        border-radius: 8px;
        border: 1px solid #333;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .image-container img {
        width: 100%;
        height: auto; 
        display: block;
    }

    .caption {
        padding: 15px;
        font-size: 18px;
        text-align: center;
        background: #252525;
        border-top: 1px solid #333;
        color: #aaa;
    }
</style>
</head>

<body>
    <h1>Задание 1</h1>
    
    <div class="collage">
    <div class="image-container">
        <img src="пункт2.png" alt="Ping kubsu.ru">
        <div class="caption">PING</div>
    </div>
    
    <div class="image-container">
        <img src="пункт3.png" alt="NSLOOKUP kubsu">
        <div class="caption">DNS-записи для kubsu.ru</div>
    </div>

    <div class="image-container">
        <img src="пункт4.png" alt="NSLOOKUP kubsu-dev">
        <div class="caption">DNS-записи для kubsu-dev.ru</div>
    </div>

    <div class="image-container">
        <img src="пункт5.png" alt="Whois">
        <div class="caption">Дата регистрации доменов (Whois)</div>
    </div>

    <div class="image-container">
        <img src="пункт6.png" alt="FileZilla">
        <div class="caption">Работа в SFTP-клиенте FileZilla</div>
    </div>
</div>
</body>
</html>
